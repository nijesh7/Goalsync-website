<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Sync - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="auth-container">
        <div class="auth-card animate-fade-in">
            <div class="auth-header">
                <h2>Goal Sync</h2>
                <p>Sync your ambitions with your actions.</p>
            </div>
            <form action="LoginServlet" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary full-width">Sign In</button>
            </form>
            <div class="auth-links">
                <p>New here? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
