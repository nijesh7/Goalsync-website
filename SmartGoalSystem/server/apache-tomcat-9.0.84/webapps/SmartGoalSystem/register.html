<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Sync - Join Now</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="auth-container">
        <div class="auth-card animate-fade-in">
            <div class="auth-header">
                <h2>Join Goal Sync</h2>
                <p>Start syncing your goals with your team.</p>
            </div>
            <form action="RegisterServlet" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@company.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="role">Your Role</label>
                    <select id="role" name="role" required>
                        <option value="employee">Employee</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary full-width">Get Started</button>
            </form>
            <div class="auth-links">
                <p>Already joined? <a href="login.html">Sign in here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
